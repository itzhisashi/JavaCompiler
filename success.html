<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Report Submitted - BCA N.H. Java Compiler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
   
    <style>
        html { background-color: transparent !important; }

        @media (prefers-color-scheme: dark) {
            body { color: #f8fafc; background-color: #0f172a !important; } 
            .bg-white { background-color: #1e293b !important; } 
            .text-slate-900 { color: #f1f5f9 !important; }
            .text-slate-500 { color: #94a3b8 !important; }
            .border-slate-100 { border-color: #334155 !important; }
            .btn-outline { background-color: #334155 !important; border-color: #475569 !important; color: #f8fafc !important; }
            .icon-bg { background-color: rgba(16, 185, 129, 0.1) !important; color: #34d399 !important; }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-card {
            opacity: 0;
            animation: fadeSlideUp 0.5s ease-out forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased p-4 md:p-8 min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full">
        
        <div class="animate-card delay-1 bg-white rounded-2xl shadow-sm border border-slate-100 p-10 text-center">
            
            <div class="icon-bg inline-flex items-center justify-center w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full mb-6">
                <i data-lucide="check-circle-2" class="w-10 h-10"></i>
            </div>
            
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight mb-4">Request Submitted</h1>
            
            <p class="text-slate-500 text-sm leading-relaxed mb-8">
                We will work on it and let you know of your problem and how to solve it. Thank you for cooperating with us and using our app BCA .N.H. Java Compiler.
            </p>

            <a href="index.html" class="btn-outline inline-flex justify-center items-center w-full bg-slate-50 border border-slate-200 hover:bg-slate-100 text-slate-700 font-semibold py-3.5 px-4 rounded-xl transition-all active:scale-[0.98]">
                <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i>
                Return to Form
            </a>
            
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
