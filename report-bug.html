<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Report | BCA N.H. Java Compiler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth fade-in animation for the main container */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        
        /* Custom scrollbar for textareas */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 via-purple-900 to-indigo-900 text-gray-100 flex items-center justify-center p-4 sm:p-8 font-sans antialiased">

    <div class="max-w-3xl w-full bg-white/10 backdrop-blur-lg border border-white/20 rounded-2xl shadow-2xl overflow-hidden animate-fade-in">
        
        <div class="bg-white/5 border-b border-white/10 p-6 sm:p-8 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-400 via-purple-500 to-pink-500"></div>
            <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight mb-2 text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-purple-300">
                BCA N.H. Java Compiler
            </h1>
            <p class="text-sm sm:text-base text-gray-300 font-medium">
                Official Bug Report Form
            </p>
            <span class="inline-block mt-3 px-3 py-1 bg-purple-500/20 border border-purple-500/30 rounded-full text-xs font-semibold text-purple-200">
                Modded by Ayush Patil
            </span>
        </div>

        <form action="#" method="POST" class="p-6 sm:p-8 space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label for="name" class="block text-sm font-medium text-gray-300">Name / BCA-III Roll No.</label>
                    <input type="text" id="name" placeholder="e.g., John Doe - Roll 45" 
                        class="w-full px-4 py-3 bg-gray-900/50 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all placeholder-gray-500 text-gray-100">
                </div>

                <div class="space-y-1">
                    <label for="device" class="block text-sm font-medium text-gray-300">Device Model & Android Version</label>
                    <input type="text" id="device" placeholder="e.g., Samsung Galaxy S21, Android 13" 
                        class="w-full px-4 py-3 bg-gray-900/50 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all placeholder-gray-500 text-gray-100">
                </div>
            </div>

            <div class="space-y-1">
                <label for="category" class="block text-sm font-medium text-gray-300">Issue Type</label>
                <select id="category" 
                    class="w-full px-4 py-3 bg-gray-900/50 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all text-gray-100 appearance-none">
                    <option value="compilation">Java Compilation Error / Build Failure</option>
                    <option value="crash">App Crash / Force Close</option>
                    <option value="ui">UI/UX Issue</option>
                    <option value="other">Other / Feature Request</option>
                </select>
            </div>

            <div class="space-y-1">
                <label for="description" class="block text-sm font-medium text-gray-300">Detailed Description & Steps to Reproduce</label>
                <textarea id="description" rows="4" placeholder="1. Open app...&#10;2. Paste this Java code...&#10;3. Click compile...&#10;4. App crashes." 
                    class="w-full px-4 py-3 bg-gray-900/50 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all placeholder-gray-500 text-gray-100 resize-none"></textarea>
            </div>

            <div class="space-y-1">
                <label class="block text-sm font-medium text-gray-300">Screenshot or Error Log (Optional)</label>
                <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-white/10 border-dashed rounded-xl hover:border-purple-400/50 transition-colors bg-gray-900/30 group">
                    <div class="space-y-1 text-center">
                        <svg class="mx-auto h-12 w-12 text-gray-400 group-hover:text-purple-400 transition-colors" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <div class="flex text-sm text-gray-400 justify-center">
                            <label for="file-upload" class="relative cursor-pointer rounded-md font-medium text-purple-400 hover:text-purple-300 focus-within:outline-none">
                                <span>Upload a file</span>
                                <input id="file-upload" name="file-upload" type="file" class="sr-only">
                            </label>
                            <p class="pl-1">or drag and drop</p>
                        </div>
                        <p class="text-xs text-gray-500">PNG, JPG, or TXT up to 10MB</p>
                    </div>
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" 
                    class="w-full flex items-center justify-center px-8 py-4 border border-transparent text-base font-bold rounded-xl text-white bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-purple-500 transform transition-all duration-300 hover:scale-[1.02] hover:shadow-[0_0_20px_rgba(168,85,247,0.4)] active:scale-95">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                    Submit Bug Report
                </button>
            </div>
        </form>
        
        <div class="bg-black/20 py-4 text-center border-t border-white/5">
            <p class="text-sm text-gray-400">
                Need study materials? Visit 
                <a href="https://bcanoteshub.blogspot.com" target="_blank" class="text-cyan-400 hover:text-cyan-300 font-medium transition-colors hover:underline">
                    bcanoteshub.blogspot.com
                </a>
            </p>
        </div>

    </div>

</body>
</html>
