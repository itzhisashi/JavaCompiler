<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bug Report - BCA N.H. Java Compiler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
   
    <style>
        /* Transparent background for Android WebView */
        html { background-color: transparent !important; }

        /* Automatic Dark Mode Handling */
        @media (prefers-color-scheme: dark) {
            body { color: #f8fafc; background-color: #0f172a !important; } 
            .bg-white { background-color: #1e293b !important; } 
            .text-slate-900 { color: #f1f5f9 !important; }
            .text-slate-800 { color: #e2e8f0 !important; }
            .text-slate-500 { color: #94a3b8 !important; }
            .border-slate-100, .border-slate-200 { border-color: #334155 !important; }
            .input-bg { background-color: #0f172a !important; color: #f8fafc !important; border-color: #334155 !important;}
            .logo-bg { background-color: rgba(16, 185, 129, 0.1) !important; border-color: rgba(16, 185, 129, 0.2) !important; }
            .logo-text { color: #34d399 !important; }
        }

        /* Page Load Staggered Fade-In Animation */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-card {
            opacity: 0;
            animation: fadeSlideUp 0.5s ease-out forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased p-4 md:p-8 min-h-screen flex flex-col items-center justify-center selection:bg-emerald-500 selection:text-white">

    <div class="max-w-md w-full space-y-4">
        
        <div class="animate-card delay-1 bg-white rounded-2xl shadow-sm border border-slate-100 p-8 text-center">
            
            <div class="logo-bg inline-flex items-center justify-center w-16 h-16 bg-emerald-50 border border-emerald-100 rounded-2xl mb-4 shadow-inner">
                <span class="logo-text text-emerald-600 font-bold text-lg leading-tight tracking-wider">BCA<br>NH</span>
            </div>
            
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight mb-6">Report an Issue</h1>
            
            <form id="bugReportForm" class="space-y-4 text-left">
                <div>
                    <label class="block text-sm font-semibold text-slate-500 mb-1 ml-1">Full Name</label>
                    <input type="text" name="name" required class="input-bg w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all placeholder-slate-400" placeholder="Student Name">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-500 mb-1 ml-1">Email Address</label>
                    <input type="email" name="email" required class="input-bg w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all placeholder-slate-400" placeholder="student@example.com">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-500 mb-1 ml-1">Device Model</label>
                    <input type="text" name="device" required class="input-bg w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all placeholder-slate-400" placeholder="e.g., Samsung Galaxy M32">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-500 mb-1 ml-1">Detailed Description</label>
                    <textarea name="description" required rows="3" class="input-bg w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all resize-none placeholder-slate-400" placeholder="What went wrong?"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3.5 px-4 rounded-xl transition-all active:scale-[0.98] shadow-sm flex justify-center items-center mt-2">
                    <i data-lucide="send" class="w-4 h-4 mr-2"></i>
                    <span>Submit Report</span>
                </button>
            </form>
        </div>

        <div class="animate-card delay-2 bg-white rounded-2xl shadow-sm border border-slate-100 p-4 text-center">
            <p class="text-sm text-slate-500">
                &copy; <span id="dynamic-year"></span> BCA N.H. Java Compiler
            </p>
        </div>

    </div>

    <script>
        lucide.createIcons();
        document.getElementById('dynamic-year').textContent = new Date().getFullYear();

        const form = document.getElementById('bugReportForm');
        const submitBtn = document.getElementById('submitBtn');
        
        // --- Paste your Google Script Web App URL here ---
        const scriptURL = 'YOUR_GOOGLE_SCRIPT_WEB_APP_URL'; 

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>';
            lucide.createIcons();

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    window.location.href = 'success.html';
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                    submitBtn.innerHTML = '<i data-lucide="send" class="w-4 h-4 mr-2"></i><span>Submit Report</span>';
                    lucide.createIcons();
                    alert('Network error. Please try again.');
                });
        });
    </script>
</body>
</html>
